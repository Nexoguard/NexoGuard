name: Compilar Nexoguard APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Dependências do Sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libbz2-dev libreadline-dev libsqlite3-dev libssl-dev xterm

      - name: Configurar Python e Buildozer
        run: |
          pip3 install --user --upgrade buildozer Cython==0.29.33 virtualenv
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Fabricar o APK Nativo com Aceite de Licença
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # Este comando diz SIM automaticamente para todos os contratos do Google Android SDK
          yes | buildozer -v android debug
        continue-on-error: false

      - name: Guardar o APK Pronto
        uses: actions/upload-artifact@v4
        with:
          name: Nexoguard-APK
          path: bin/*.apk
