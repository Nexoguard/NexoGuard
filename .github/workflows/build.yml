name: Compilar Nexoguard APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build com Buildozer Atualizado
        uses: Kuldeeprawat956/buildozer-action@v1
        with:
          command: buildozer android debug
          repository_root: .

      - name: Upload do APK Pronto
        uses: actions/upload-artifact@v4
        with:
          name: Nexoguard-APK
          path: bin/*.apk
