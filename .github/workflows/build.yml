name: Compilar Nexoguard APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Build com Buildozer Action
        uses: ArtemGovorov/buildozer-action@v1
        with:
          command: buildozer android debug
          repository_root: .

      - name: Upload do APK Pronto
        uses: actions/upload-artifact@v4
        with:
          name: Nexoguard-APK
          path: bin/*.apk
