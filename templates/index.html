<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>NexoGuard // Avançado</title><style>:root { --bg-dark: #0b0f19; --card-bg: #131a2c; --neon-green: #00ffcc; --neon-blue: #0077ff; --neon-yellow: #ffcc00; --text-main: #ffffff; --text-muted: #718096; } * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; } body { background-color: var(--bg-dark); color: var(--text-main); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; } header { text-align: center; margin-top: 10px; margin-bottom: 30px; } header h1 { font-size: 2.2rem; color: var(--neon-green); letter-spacing: 3px; font-weight: 800; text-transform: uppercase; } header p { font-size: 0.85rem; color: var(--text-muted); letter-spacing: 1.5px; margin-top: 5px; text-transform: uppercase; } .card { background-color: var(--card-bg); border-radius: 12px; width: 100%; max-width: 480px; padding: 22px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.3); } .card-info { display: flex; flex-direction: column; gap: 5px; } .card-info .label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; } .card-info .value { font-size: 1.4rem; font-weight: bold; }.circle-progress { width: 65px; height: 65px; border-radius: 50%; display: flex; justify-content: center; align-items: center; position: relative; transition: background 0.1s linear; } .circle-progress::before { content: ""; position: absolute; width: 53px; height: 53px; background-color: var(--card-bg); border-radius: 50%; } .circle-progress span { position: relative; font-size: 0.85rem; font-weight: bold; } #ringIntegridade { background: conic-gradient(var(--neon-green) 0deg, #222d4a 0deg); color: var(--neon-green); } #ringHosts { background: conic-gradient(var(--neon-blue) 0deg, #222d4a 0deg); color: var(--neon-blue); } #ringTrafego { background: conic-gradient(var(--neon-yellow) 0deg, #222d4a 0deg); color: var(--neon-yellow); } .list-panel { background-color: var(--card-bg); border-radius: 12px; width: 100%; max-width: 480px; padding: 22px; margin-bottom: 25px; } .list-panel h2 { font-size: 0.85rem; color: var(--neon-blue); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; } .device-item { padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; } .device-item:last-child { border-bottom: none; } .device-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 3px; } .device-details { font-size: 0.75rem; color: var(--text-muted); }.device-ping { font-size: 0.85rem; font-weight: bold; color: var(--neon-green); background: rgba(0, 255, 204, 0.1); padding: 4px 8px; border-radius: 6px; border: 1px solid rgba(0, 255, 204, 0.2); } .btn-scan { width: 100%; max-width: 480px; background-color: var(--neon-green); color: #000000; border: none; padding: 18px; border-radius: 12px; font-size: 1rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer; transition: all 0.2s ease; } .btn-scan:disabled { background-color: var(--text-muted); cursor: not-allowed; opacity: 0.6; } </style></head><body><header><h1>NexoGuard</h1><p>Segurança Avançada de Rede</p></header><div class="card"><div class="card-info"><span class="label">Integridade da Rede</span><span class="value" id="lblIntegridade">Pronto</span></div><div class="circle-progress" id="ringIntegridade"><span id="txtIntegridade">0%</span></div></div><div id="realReport" style="background:#1a233a;border:1px solid #00ffcc;border-radius:12px;width:100%;max-width:480px;padding:15px;margin-bottom:20px;font-size:0.85rem;display:none;"><h3 style="color:#00ffcc;margin-bottom:6px;font-size:0.9rem;">📊 Relatório Analítico Real</h3><p id="realReportText" style="color:#cbd5e1;line-height:1.4;"></p></div><div class="card"><div class="card-info"><span class="label">Hosts Identificados</span><span class="value" id="lblHosts">0 Ativo(s)</span></div><div class="circle-progress" id="ringHosts"><span id="txtHosts">0</span></div></div><div class="card"><div class="card-info"><span class="label">Análise de Tráfego</span><span class="value" id="lblTrafego">0.0 KB</span></div><div class="circle-progress" id="ringTrafego"><span id="txtTrafego">0%</span></div></div><div class="list-panel"><h2>Dispositivos Mapeados no Wi-Fi</h2><div id="deviceContainer"><div style="font-size: 0.85rem; color: var(--text-muted);">Inicie uma varredura para listar...</div></div></div><button class="btn-scan" id="btnScanAction" onclick="acionarVarredura()">Nova Varredura</button><script>const EXPLICIT_API = window.location.origin; let loopMonitoramento = null;function renderizarInterface(data) { const grausProgressao = (data.progress / 100) * 360; document.getElementById("lblIntegridade").innerText = data.running ? "Analisando..." : "Concluído"; document.getElementById("txtIntegridade").innerText = data.progress + "%"; document.getElementById("ringIntegridade").style.background = "conic-gradient(var(--neon-green) " + grausProgressao + "deg, #222d4a 0deg)"; document.getElementById("lblHosts").innerText = data.devices.length + " Ativo(s)"; document.getElementById("txtHosts").innerText = data.devices.length; document.getElementById("ringHosts").style.background = "conic-gradient(var(--neon-blue) " + grausProgressao + "deg, #222d4a 0deg)"; document.getElementById("lblTrafego").innerText = data.packets_kb + " KB"; document.getElementById("txtTrafego").innerText = data.progress + "%"; document.getElementById("ringTrafego").style.background = "conic-gradient(var(--neon-yellow) " + grausProgressao + "deg, #222d4a 0deg)"; const container = document.getElementById("deviceContainer");if (data.devices.length > 0) { container.innerHTML = ""; data.devices.forEach(function(dev) { const nomeTratado = dev.nome.replace(/Smartphone Android/gi, "Smartphone"); const item = document.createElement("div"); item.className = "device-item"; item.innerHTML = "<div><div class=\"device-title\"><strong>" + dev.ip + "</strong> — " + nomeTratado + "</div><div class=\"device-details\">MAC: " + dev.mac + " | Classe: " + dev.classe + "</div></div><div class=\"device-ping\">" + dev.ping + "</div>"; container.appendChild(item); }); } else { container.innerHTML = "<div style=\"font-size: 0.85rem; color: var(--text-muted);\">Inicie uma varredura para listar...</div>"; }if (data.progress === 100 && data.devices.length > 0) { let somaPing = 0, qtdValidapings = 0, iotDispositivos = 0; data.devices.forEach(function(d) { if (d.classe === "IoT / Media") iotDispositivos++; let pVal = parseFloat(d.ping); if (!isNaN(pVal)) { somaPing += pVal; qtdValidapings++; } }); let mediaPing = qtdValidapings > 0 ? (somaPing / qtdValidapings).toFixed(1) : "0.0"; let diagnosticoStr = iotDispositivos > 0 ? "<b>Diagnóstico:</b> Foram detectados " + iotDispositivos + " dispositivos da classe IoT/Media na topologia atual. Recomenda-se isolamento de rede para mitigar vetores latentes." : "<b>Diagnóstico:</b> O perímetro analisado apresenta conformidade operacional estrita. Latências normais."; document.getElementById("realReport").style.display = "block"; document.getElementById("realReportText").innerHTML = "<b>Monitoramento Ativo:</b> Sincronizado com o scanner.<br><b>Perímetro Coletado:</b> " + data.devices.length + " hosts ativos identificados.<br><b>Latência Média Operacional:</b> " + mediaPing + " ms.<br>" + diagnosticoStr; } const btn = document.getElementById("btnScanAction"); if (data.running) { btn.disabled = true; btn.innerText = "Varrendo Rede..."; } else { btn.disabled = false; btn.innerText = "Nova Varredura"; if (loopMonitoramento && data.progress === 100) { clearInterval(loopMonitoramento); loopMonitoramento = null; } } }function sincronizarStatus() { fetch(EXPLICIT_API + "/api/status").then(function(res) { return res.json(); }).then(function(data) { renderizarInterface(data); }).catch(function(err) { console.error("Erro Polling:", err); }); } function acionarVarredura() { if (loopMonitoramento) clearInterval(loopMonitoramento); try { document.getElementById("realReport").style.display = "none"; } catch(e) {} fetch(EXPLICIT_API + "/api/scan").then(function() { loopMonitoramento = setInterval(sincronizarStatus, 500); }).catch(function(err) { console.error("Erro Activar:", err); }); } setTimeout(sincronizarStatus, 1500);</script></body></html>
